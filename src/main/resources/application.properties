quarkus.datasource.db-kind=mssql
quarkus.datasource.jdbc.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=tscore_productmanagement;encrypt=true;trustServerCertificate=true}
quarkus.datasource.username=${DB_USERNAME:sa}
quarkus.datasource.password=${DB_PASSWORD:changeme}

quarkus.hibernate-orm.database.generation=none

quarkus.http.port=${QUARKUS_HTTP_PORT:8980}

quarkus.transaction-manager.enable-recovery=true

quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."com.tscore".level=DEBUG

quarkus.http.cors=true
quarkus.http.cors.origins=${QUARKUS_HTTP_CORS_ORIGINS:http://localhost:4200}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.sql-load-script=test-import.sql
%test.quarkus.log.level=WARN
%test.quarkus.log.category."com.tscore".level=DEBUG
